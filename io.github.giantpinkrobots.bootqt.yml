app-id: io.github.giantpinkrobots.bootqt
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: io.qt.PySide.BaseApp
base-version: '6.10'

command: bootqt.sh

finish-args:
  - --device=all
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=host
  - --talk-name=org.freedesktop.Flatpak

cleanup-commands:
  - /app/cleanup-BaseApp.sh
build-options:
  env:
    - BASEAPP_REMOVE_WEBENGINE=1
  
modules:
  - name: bootqt
    buildsystem: simple
    build-commands:
      - install -Dm755 flatpak/bootqt.sh -t /app/bin/
      - install -Dm755 bootqt.py -t /app/lib/bootqt/
      - install -Dm755 flatpak/${FLATPAK_ID}.png -t /app/share/icons/hicolor/256x256/apps
      - install -Dm755 flatpak/${FLATPAK_ID}.png -t /app/lib/bootqt/
      - install -Dm755 flatpak/${FLATPAK_ID}.desktop -t /app/share/applications
      - install -Dm755 ${FLATPAK_ID}.metainfo.xml -t /app/share/metainfo/
      - install -Dm755 bqi18n/da.py -t /app/lib/bootqt/bqi18n/
      - install -Dm755 bqi18n/de.py -t /app/lib/bootqt/bqi18n/
      - install -Dm755 bqi18n/it.py -t /app/lib/bootqt/bqi18n/
      - install -Dm755 bqi18n/ja.py -t /app/lib/bootqt/bqi18n/
      - install -Dm755 bqi18n/ptbr.py -t /app/lib/bootqt/bqi18n/
      - install -Dm755 bqi18n/tr.py -t /app/lib/bootqt/bqi18n/
    
    sources:
      - type: git
        url: https://github.com/giantpinkrobots/bootqt.git
        commit: d06d4eed9f3b4e16fdbce28e7cee6b29320cb5c6
      - type: file
        path: io.github.giantpinkrobots.bootqt.metainfo.xml
